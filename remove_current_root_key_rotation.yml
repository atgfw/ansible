---
# Remove the previous ATG management key after the replacement is verified.
# Run this phase with the replacement-key AWX credential.
- name: Remove previous ATG SSH key from root
  hosts: all
  gather_facts: false
  become: true
  serial: 1
  any_errors_fatal: true
  vars:
    previous_root_pub_key: "{{ lookup('file', 'files/current_management_key.pub') }}"
    previous_root_pub_key_b64: "{{ previous_root_pub_key | b64encode }}"
  tasks:
    - name: Ensure previous management SSH key is absent for root
      ansible.builtin.raw: |
        set -eu
        key="$(printf '%s' '{{ previous_root_pub_key_b64 }}' | base64 -d)"
        if [ -f /root/.ssh/authorized_keys ]; then
          tmp="$(mktemp)"
          grep -Fvx -- "$key" /root/.ssh/authorized_keys > "$tmp" || true
          cat "$tmp" > /root/.ssh/authorized_keys
          rm -f "$tmp"
          chmod 600 /root/.ssh/authorized_keys
        fi
